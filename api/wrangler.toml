name = "bao-class-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
# account_id 已通过 wrangler login 自动获取，不需要硬编码

# 添加自定义域名路由配置
routes = [
  { pattern = "api.980823.xyz/*", zone_name = "980823.xyz" },
]

[vars]
ENVIRONMENT = "production"

# 敏感信息请通过以下命令设置：
# wrangler secret put JWT_SECRET
# wrangler secret put DASHSCOPE_API_KEY
# wrangler secret put CLOUDFLARE_API_TOKEN

# 可观察性配置
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

# D1 数据库配置
[[d1_databases]]
binding = "DB"
database_name = "class"
# database_id 已通过 wrangler d1 自动获取，不需要硬编码

# KV 命名空间配置
[[kv_namespaces]]
binding = "KV"
# id 已通过 wrangler kv 自动获取，不需要硬编码

# R2 存储桶配置
[[r2_buckets]]
binding = "R2"
bucket_name = "class"

# AI 绑定配置
[ai]
binding = "AI"